<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aesthetic BMI Calculator</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- Tailwind -->
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background: linear-gradient(135deg,#667eea,#764ba2);
}

.glass{
backdrop-filter: blur(15px);
background: rgba(255,255,255,0.15);
border:1px solid rgba(255,255,255,0.3);
}

.result{
opacity:0;
transform:translateY(20px);
transition: all 0.5s ease;
}

.result.show{
opacity:1;
transform:translateY(0);
}

.emoji{
font-size:60px;
animation: pop 0.4s ease;
}

@keyframes pop{
0%{transform:scale(0.5)}
100%{transform:scale(1)}
}

button:hover{
transform:scale(1.03);
}

</style>
</head>

<body class="flex items-center justify-center min-h-screen px-4">

<div class="glass shadow-2xl rounded-2xl p-8 w-full max-w-md text-white">

<div class="text-center mb-6">
<h1 class="text-4xl font-bold mb-2">BMI Calculator</h1>
<p class="text-gray-200 text-sm">Check your Body Mass Index instantly</p>
</div>

<form id="bmiForm" class="space-y-4">

<div>
<label class="text-sm">Weight (kg)</label>
<input type="number" id="weight" required
class="w-full mt-1 px-3 py-2 rounded-lg text-black focus:outline-none focus:ring-2 focus:ring-purple-400">
</div>

<div>
<label class="text-sm">Height (cm)</label>
<input type="number" id="height" required
class="w-full mt-1 px-3 py-2 rounded-lg text-black focus:outline-none focus:ring-2 focus:ring-purple-400">
</div>

<button
class="w-full bg-white text-purple-700 font-semibold py-2 rounded-lg shadow-md transition duration-200">
Calculate BMI
</button>

</form>

<div id="result" class="result mt-6 text-center">

<p class="text-lg">Your BMI</p>

<p id="bmiValue" class="text-3xl font-bold"></p>

<p class="mt-2">Category: <span id="category" class="font-semibold"></span></p>

<p id="emoji" class="emoji mt-3"></p>

</div>

</div>

<script>

document.getElementById("bmiForm").addEventListener("submit",function(e){

e.preventDefault()

const weight=parseFloat(document.getElementById("weight").value)
const height=parseFloat(document.getElementById("height").value)/100

const bmi=(weight/(height*height)).toFixed(2)

let category=""
let emoji=""

if(bmi<18.5){
category="Underweight"
emoji="😟"
}
else if(bmi<24.9){
category="Normal Weight"
emoji="😊"
}
else if(bmi<29.9){
category="Overweight"
emoji="😬"
}
else{
category="Obesity"
emoji="😱"
}

document.getElementById("bmiValue").innerText=bmi
document.getElementById("category").innerText=category
document.getElementById("emoji").innerText=emoji

document.getElementById("result").classList.add("show")

})

</script>

</body>
</html>
